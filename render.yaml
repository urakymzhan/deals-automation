services:
  - type: web
    name: deals-web
    runtime: python
    buildCommand: pip install -r requirements-web.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: deals-db
          property: connectionString
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: NOTIFICATION_METHOD
        value: email

databases:
  - name: deals-db
    plan: free
