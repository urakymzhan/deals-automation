services:
  - type: web
    name: deals-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: deals-db
          property: connectionString
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: NOTIFICATION_METHOD
        value: email

  - type: cron
    name: deals-tracker
    runtime: python
    schedule: "0 8 * * 1"   # every Monday at 8 AM UTC
    buildCommand: pip install -r requirements.txt && playwright install chromium
    startCommand: python home_tracker.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: deals-db
          property: connectionString
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: NOTIFICATION_METHOD
        value: email

databases:
  - name: deals-db
    plan: free
